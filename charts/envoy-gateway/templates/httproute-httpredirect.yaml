{{- $sectionNames := list }}
{{- range $name := .Values.envoyGateway.gateway.httpsRedirect }}
  {{- range $listener := $.Values.envoyGateway.gateway.listeners }}
    {{- if and (eq $listener.name $name) (eq $listener.protocol "HTTP") }}
      {{- $sectionNames = append $sectionNames $name }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if $sectionNames }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-http-redirect
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
spec:
  parentRefs:
  {{- range $name := $sectionNames }}
  - name: {{ $.Release.Name }}
    sectionName: {{ $name }}
  {{- end }}
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
{{- end }}
