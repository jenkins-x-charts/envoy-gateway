{{- if .Values.envoyGateway.gatewayClass.create }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.envoyGateway.gatewayClass.name }}
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
spec:
  controllerName: {{ .Values.envoyGateway.gatewayClass.controllerName }}
{{- end }}
